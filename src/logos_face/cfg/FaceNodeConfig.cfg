#!/usr/bin/env python
# file: FaceNodeConfig.cfg
PACKAGE = "logos_face"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

# Existing
gen.add("fps", int_t, 0, "Render FPS (timer period)", 8, 1, 24)

# Output backend
gen.add("output_mode", str_t, 0,
        "Output mode: 'display' uses libcaca display drivers (ncurses/x11/gl/etc). 'ansi' prints exported ANSI to stdout.",
        "display")
gen.add("caca_driver", str_t, 0,
        "libcaca display driver when output_mode='display' (examples: ncurses, slang, x11, gl, raw).",
        "ncurses")

# Dither tuning (rendering-only tweaks)
gen.add("dither_antialias", str_t, 0,
        "Antialiasing mode: 'none' or 'prefilter'/'default'.",
        "default")
gen.add("dither_color", str_t, 0,
        "Color mode: mono, gray, 8, 16, fullgray, full8, full16/default.",
        "full16")
gen.add("dither_charset", str_t, 0,
        "Charset: ascii/default, shades, blocks.",
        "ascii")
gen.add("dither_algorithm", str_t, 0,
        "Algorithm: none, ordered2, ordered4, ordered8, random, fstein.",
        "ordered4")

gen.add(
    "render_px_per_char_x",
    double_t,
    0,
    "Render pixels per character cell in X",
    1.0,
    0.001,
    4.0
)

gen.add(
    "render_px_per_char_y",
    double_t,
    0,
    "Render pixels per character cell in Y",
    1.0,
    0.001,
    4.0
)

exit(gen.generate(PACKAGE, "logos_face", "FaceNode"))
