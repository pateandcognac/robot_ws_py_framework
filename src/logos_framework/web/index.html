<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logos Framework UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="header" class="panel"></div>
        
        <div id="middle-pane" class="panel">
            <div id="view-tabs" class="view-tabs" role="tablist">
                <button id="chat-tab" class="view-tab active" type="button" role="tab" aria-selected="true">Chat</button>
                <button id="debug-vision-tab" class="view-tab" type="button" role="tab" aria-selected="false">Debug Vision</button>
            </div>

            <div id="io-buffer" class="middle-view active"></div>

            <div id="debug-vision-view" class="middle-view">
                <div class="debug-vision-toolbar">
                    <label for="debug-vision-count">Last</label>
                    <select id="debug-vision-count">
                        <option value="4" selected>4</option>
                        <option value="8">8</option>
                    </select>

                    <label for="debug-vision-topic-filter">Topic</label>
                    <select id="debug-vision-topic-filter">
                        <option value="">All</option>
                    </select>

                    <label class="debug-vision-pause-label">
                        <input type="checkbox" id="debug-vision-pause">
                        Pause
                    </label>

                    <span id="debug-vision-status"></span>
                </div>
                <div id="debug-vision-grid"></div>
            </div>
            
            <!-- NEW: Status bar for thoughts / feedback -->
            <div id="status-bar" style="display: none;"></div>

            <div id="input-container">
                 <div class="controls">
                    <button id="runtime-config-toggle" type="button" title="Runtime Gemini settings">Config</button>
                    <button id="jsonl-viewer-button" type="button" title="Open JSONL state viewer">Logs</button>
                    <button id="hook-refresh-button" type="button" title="Run hooks once and refresh the UI">Run Hooks</button>
                    <div id="runtime-config-popover" class="runtime-config-popover" hidden>
                        <div class="config-grid">
                            <label for="api-profile-select">API</label>
                            <select id="api-profile-select"></select>

                            <label for="model-preset-select">Preset</label>
                            <select id="model-preset-select"></select>

                            <label for="model-input">Model</label>
                            <input type="text" id="model-input">

                            <label for="thinking-level-select">Thinking</label>
                            <select id="thinking-level-select"></select>

                            <label for="media-resolution-select">Media</label>
                            <select id="media-resolution-select"></select>

                            <label for="files-api-toggle">Files API</label>
                            <input type="checkbox" id="files-api-toggle">

                            <label for="key-failover-toggle">Failover</label>
                            <input type="checkbox" id="key-failover-toggle">
                        </div>
                        <div id="runtime-config-status"></div>
                    </div>

                    <label for="type-input">Type:</label>
                    <input type="text" id="type-input" value="human">
                    
                    <input type="checkbox" id="mode-toggle">
                    <label for="mode-toggle">Simulate AI Output</label>

                    <span id="loop-cognition-controls">
                        <input type="checkbox" id="loop-cognition-checkbox" checked>
                        <label for="loop-cognition-checkbox">Loop Cognition</label>
                    </span>
                </div>
                <textarea id="human-input" placeholder="Enter your message... (Ctrl+Enter to send)"></textarea>
            </div>
        </div>

        <div id="footer" class="panel"></div>
    </div>

    <div id="paid-key-alert" class="paid-key-alert" role="alertdialog" aria-modal="true" aria-labelledby="paid-key-alert-title" hidden>
        <div class="paid-key-alert-card">
            <div id="paid-key-alert-title" class="paid-key-alert-title">Paid API key active</div>
            <div id="paid-key-alert-body" class="paid-key-alert-body"></div>
            <button id="paid-key-alert-close" type="button">OK</button>
        </div>
    </div>

    <div id="debug-vision-modal" class="debug-vision-modal" role="dialog" aria-modal="true" hidden>
        <button id="debug-vision-modal-close" class="debug-vision-modal-close" type="button" title="Close">Close</button>
        <div class="debug-vision-modal-content">
            <img id="debug-vision-modal-image" alt="">
            <div id="debug-vision-modal-meta" class="debug-vision-modal-meta"></div>
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/split.js/1.6.0/split.min.js"></script>
    
    <!-- Our script -->
    <script src="script.js"></script>
</body>
</html>
