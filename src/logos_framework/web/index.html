<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logos Framework UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="header" class="panel"></div>
        
        <div id="middle-pane" class="panel">
            <div id="io-buffer"></div>
            
            <!-- NEW: Status bar for thoughts / feedback -->
            <div id="status-bar" style="display: none;"></div>

            <div id="input-container">
                 <div class="controls">
                    <button id="runtime-config-toggle" type="button" title="Runtime Gemini settings">Config</button>
                    <div id="runtime-config-popover" class="runtime-config-popover" hidden>
                        <div class="config-grid">
                            <label for="api-profile-select">API</label>
                            <select id="api-profile-select"></select>

                            <label for="model-preset-select">Preset</label>
                            <select id="model-preset-select"></select>

                            <label for="model-input">Model</label>
                            <input type="text" id="model-input">

                            <label for="thinking-level-select">Thinking</label>
                            <select id="thinking-level-select"></select>

                            <label for="media-resolution-select">Media</label>
                            <select id="media-resolution-select"></select>

                            <label for="files-api-toggle">Files API</label>
                            <input type="checkbox" id="files-api-toggle">

                            <label for="key-failover-toggle">Failover</label>
                            <input type="checkbox" id="key-failover-toggle">
                        </div>
                        <div id="runtime-config-status"></div>
                    </div>

                    <label for="type-input">Type:</label>
                    <input type="text" id="type-input" value="human">
                    
                    <input type="checkbox" id="mode-toggle">
                    <label for="mode-toggle">Simulate AI Output</label>

                    <span id="loop-cognition-controls">
                        <input type="checkbox" id="loop-cognition-checkbox" checked>
                        <label for="loop-cognition-checkbox">Loop Cognition</label>
                    </span>
                </div>
                <textarea id="human-input" placeholder="Enter your message... (Ctrl+Enter to send)"></textarea>
            </div>
        </div>

        <div id="footer" class="panel"></div>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/split.js/1.6.0/split.min.js"></script>
    
    <!-- Our script -->
    <script src="script.js"></script>
</body>
</html>
